<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Child Vaccination System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .content-area {
      min-height: calc(100vh - 60px);
      padding: 30px;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <button class="navbar-toggler-menu" onclick="toggleSidebar()" title="Toggle menu"></button>
      <a class="navbar-brand fw-bold" href="dashboard.html">Child Vaccination System
      </a>
      <div class="ms-auto d-flex align-items-center">
        <span class="text-light me-3 small" id="userDisplay"></span>
      </div>
    </div>
  </nav>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Popup Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-logo">CV</div>
        <h6>Child Vaccination</h6>
      </div>
      <button class="btn-close btn-close-white" onclick="closeSidebar()"></button>
    </div>
    <ul class="nav flex-column" id="sidebarMenu"></ul>
  </nav>

  <div class="container-fluid mt-3">
    <div class="row">
      <!-- Main Content (full width, no sidebar column) -->
      <main class="col-12 content-area">
        <!-- Dashboard Stats -->
        <div id="dashboardContent">
          <h2 class="mb-4">Dashboard</h2>
          <div class="row" id="dashboardStats">
            <div class="col-md-3">
              <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
