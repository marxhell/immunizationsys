<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory - Child Vaccination System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <button class="navbar-toggler-menu" onclick="toggleSidebar()" title="Toggle menu"></button>
      <a class="navbar-brand fw-bold" href="dashboard.html">Child Vaccination System</a>
      <div class="ms-auto d-flex align-items-center">
        <span class="text-light me-3 small" id="userDisplay"></span>
      </div>
    </div>
  </nav>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Popup Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-logo">CV</div>
        <h6>Child Vaccination</h6>
      </div>
      <button class="btn-close btn-close-white" onclick="closeSidebar()"></button>
    </div>
    <ul class="nav flex-column" id="sidebarMenu"></ul>
  </nav>

  <div class="container-fluid mt-3">
    <div class="row">
      <!-- Main Content (full width) -->
      <main class="col-12 p-4">
        <h2 class="mb-4">Vaccine Inventory</h2>

        <!-- Toolbar -->
        <div class="row mb-4">
          <div class="col-md-6">
            <input type="text" class="form-control" id="searchVaccine" placeholder="Search by vaccine name...">
          </div>
          <div class="col-md-6 text-end">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addVaccineModal">Add Vaccine Batch
            </button>
          </div>
        </div>

        <!-- Alerts Summary -->
        <div class="row mb-4">
          <div class="col-md-4">
            <div class="alert alert-warning">
              <strong>Low Stock:</strong> <span id="lowStockCount">0</span>
            </div>
          </div>
          <div class="col-md-4">
            <div class="alert alert-danger">
              <strong>Expiring Soon:</strong> <span id="expiringCount">0</span>
            </div>
          </div>
          <div class="col-md-4">
            <div class="alert alert-info">
              <strong>Total Stock:</strong> <span id="totalStock">0</span>
            </div>
          </div>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-4" role="tablist">
          <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#inventoryTab">Current Stock</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#lowStockTab">Low Stock Alerts</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#expiringTab">Expiring Vaccines</button>
          </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content">
          <!-- Current Stock -->
          <div class="tab-pane fade show active" id="inventoryTab">
            <div class="card">
              <div class="card-header">
                <h5 class="mb-0">Vaccine Inventory</h5>
              </div>
              <div class="card-body">
                <div id="inventoryList"></div>
              </div>
            </div>
          </div>

          <!-- Low Stock Alerts -->
          <div class="tab-pane fade" id="lowStockTab">
            <div class="card">
              <div class="card-header">
                <h5 class="mb-0">Low Stock Alerts</h5>
              </div>
              <div class="card-body">
                <div id="lowStockList"></div>
              </div>
            </div>
          </div>

          <!-- Expiring Vaccines -->
          <div class="tab-pane fade" id="expiringTab">
            <div class="card">
              <div class="card-header">
                <h5 class="mb-0">Expiring Vaccines (Next 30 Days)</h5>
              </div>
              <div class="card-body">
                <div id="expiringList"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Add Vaccine Modal -->
  <div class="modal fade" id="addVaccineModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add Vaccine Batch</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="vaccineForm" onsubmit="handleAddVaccine(event)">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Vaccine Name *</label>
                <select class="form-select" id="vaccineName" required>
                  <option value="">Select vaccine...</option>
                  <option value="BCG">BCG</option>
                  <option value="OPV">OPV</option>
                  <option value="Pentavalent">Pentavalent</option>
                  <option value="Measles">Measles</option>
                  <option value="Rotavirus">Rotavirus</option>
                  <option value="PCV">PCV</option>
                  <option value="Hepatitis B">Hepatitis B</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Batch Number *</label>
                <input type="text" class="form-control" id="batchNumber" required>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Quantity Received *</label>
                <input type="number" class="form-control" id="quantity" min="1" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Min Stock Level *</label>
                <input type="number" class="form-control" id="minStock" min="1" value="50" required>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Date Received *</label>
                <input type="date" class="form-control" id="dateReceived" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Expiry Date *</label>
                <input type="date" class="form-control" id="expiryDate" required>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Supplier *</label>
                <input type="text" class="form-control" id="supplier" required>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="handleAddVaccine()">Add Batch</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/dashboard.js"></script>
  <script src="../js/inventory.js"></script>
</body>
</html>
