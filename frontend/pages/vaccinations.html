<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaccinations - Child Vaccination System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <button class="navbar-toggler-menu" onclick="toggleSidebar()" title="Toggle menu"></button>
      <a class="navbar-brand fw-bold" href="dashboard.html">Child Vaccination System
      </a>
      <div class="ms-auto d-flex align-items-center">
        <span class="text-light me-3 small" id="userDisplay"></span>
      </div>
    </div>
  </nav>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Popup Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-logo">CV</div>
        <h6>Child Vaccination</h6>
      </div>
      <button class="btn-close btn-close-white" onclick="closeSidebar()"></button>
    </div>
    <ul class="nav flex-column" id="sidebarMenu"></ul>
  </nav>

  <div class="container-fluid mt-3">
    <div class="row">
      <!-- Main Content (full width) -->
      <main class="col-12 p-4">
        <h2 class="mb-4">Vaccinations Management</h2>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-4" role="tablist">
          <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#upcomingTab">Upcoming</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#overdueTab">Overdue</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#recordTab">Record Vaccination</button>
          </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content">
          <!-- Upcoming Vaccinations -->
          <div class="tab-pane fade show active" id="upcomingTab">
            <div class="card">
              <div class="card-header">
                <h5 class="mb-0">Upcoming Vaccinations</h5>
              </div>
              <div class="card-body">
                <div id="upcomingList"></div>
              </div>
            </div>
          </div>

          <!-- Overdue Vaccinations -->
          <div class="tab-pane fade" id="overdueTab">
            <div class="card">
              <div class="card-header">
                <h5 class="mb-0">Overdue Vaccinations</h5>
              </div>
              <div class="card-body">
                <div id="overdueList"></div>
              </div>
            </div>
          </div>

          <!-- Record Vaccination -->
          <div class="tab-pane fade" id="recordTab">
            <div class="card">
              <div class="card-header">
                <h5 class="mb-0">Record New Vaccination</h5>
              </div>
              <div class="card-body">
                <form id="recordVaccinationForm" onsubmit="handleRecordVaccination(event)">
                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <label class="form-label">Child *</label>
                      <select class="form-select" id="childSelect" required>
                        <option value="">Select child...</option>
                      </select>
                    </div>
                    <div class="col-md-6 mb-3">
                      <label class="form-label">Vaccine *</label>
                      <select class="form-select" id="vaccineSelect" required>
                        <option value="">Select vaccine...</option>
                      </select>
                    </div>
                  </div>
                  <div class="row">
                    <div class="col-md-6 mb-3">
                      <label class="form-label">Dose Number *</label>
                      <input type="number" class="form-control" id="doseNumber" min="1" required>
                    </div>
                    <div class="col-md-6 mb-3">
                      <label class="form-label">Administration Date *</label>
                      <input type="date" class="form-control" id="adminDate" required>
                    </div>
                  </div>
                  <div class="mb-3">
                    <label class="form-label">Vaccine Batch Number *</label>
                    <input type="text" class="form-control" id="batchNumber" required>
                  </div>
                  <!-- notes removed -->
                  <button type="submit" class="btn btn-primary">Record Vaccination</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/dashboard.js"></script>
  <script src="../js/vaccinations.js"></script>
</body>
</html>
