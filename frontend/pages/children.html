<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Children - Child Vaccination System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <button class="navbar-toggler-menu" onclick="toggleSidebar()" title="Toggle menu"></button>
      <a class="navbar-brand fw-bold" href="dashboard.html">Child Vaccination System
      </a>
      <div class="ms-auto d-flex align-items-center">
        <span class="text-light me-3 small" id="userDisplay"></span>
      </div>
    </div>
  </nav>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Popup Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-logo">CV</div>
        <h6>Child Vaccination</h6>
      </div>
      <button class="btn-close btn-close-white" onclick="closeSidebar()"></button>
    </div>
    <ul class="nav flex-column" id="sidebarMenu"></ul>
  </nav>

  <div class="container-fluid mt-3">
    <div class="row">
      <!-- Main Content (full width) -->
      <main class="col-12 p-4">
        <h2 class="mb-4">Children Management</h2>

        <!-- Toolbar -->
        <div class="row mb-4">
          <div class="col-md-6">
            <input type="text" class="form-control" id="searchInput" placeholder="Search by name or patient ID...">
          </div>
          <div class="col-md-6 text-end">
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#registerChildModal">Register New Child
            </button>
          </div>
        </div>

        <!-- Children List -->
        <div class="card">
          <div class="card-header">
            <h5 class="mb-0">Children Records</h5>
          </div>
          <div class="card-body">
            <div id="childrenList"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Register Child Modal -->
  <div class="modal fade" id="registerChildModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Register New Child</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="registerChildForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">First Name *</label>
                <input type="text" class="form-control" id="firstName" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Last Name *</label>
                <input type="text" class="form-control" id="lastName" required>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Date of Birth *</label>
                <input type="date" class="form-control" id="dateOfBirth" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Gender *</label>
                <select class="form-select" id="gender" required>
                  <option value="">Select gender...</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Blood Group</label>
                <select class="form-select" id="bloodGroup">
                  <option value="">Select...</option>
                  <option value="A+">A+</option>
                  <option value="A-">A-</option>
                  <option value="B+">B+</option>
                  <option value="B-">B-</option>
                  <option value="AB+">AB+</option>
                  <option value="AB-">AB-</option>
                  <option value="O+">O+</option>
                  <option value="O-">O-</option>
                </select>
              </div>
            </div>
            <hr>
            <h6 class="text-muted mb-3">Guardian Information</h6>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Guardian Name</label>
                <input type="text" class="form-control" id="guardianName">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Guardian Relationship</label>
                <select class="form-select" id="guardianRelationship">
                  <option value="">Select...</option>
                  <option value="mother">Mother</option>
                  <option value="father">Father</option>
                  <option value="guardian">Guardian</option>
                  <option value="grandparent">Grandparent</option>
                  <option value="other">Other</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Guardian Email</label>
                <input type="email" class="form-control" id="guardianEmail" placeholder="For appointment reminders">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Guardian Phone</label>
                <input type="tel" class="form-control" id="guardianPhone" placeholder="07XX XXX XXX">
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="handleRegisterChild()">Register Child</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Child Details Modal -->
  <div class="modal fade" id="childDetailsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Child Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="childDetailsContent"></div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/dashboard.js"></script>
  <script src="../js/children.js"></script>
</body>
</html>
