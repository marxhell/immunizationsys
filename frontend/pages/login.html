<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Child Vaccination System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body {
      background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      max-width: 400px;
      width: 100%;
    }
    .card {
      border: none;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }
    .card-header {
      background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
      border-radius: 10px 10px 0 0;
      text-align: center;
    }
    .btn-primary {
      background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
      border: none;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #0056b3 0%, #007bff 100%);
    }
    .demo-creds {
      background: #f0f7ff;
      border-left: 4px solid #007bff;
      padding: 15px;
      border-radius: 5px;
      margin-top: 20px;
    }
    .error-alert {
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="card">
      <div class="card-header text-white p-4">
        <h3 class="mb-0">Child Vaccination System</h3>
        <small>Kenyenya District Hospital</small>
      </div>
      <div class="card-body p-4">
        <!-- Error Alert -->
        <div id="errorAlert" class="alert alert-danger error-alert" role="alert"></div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" required placeholder="Enter your email">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required placeholder="Enter your password">
          </div>

          <!-- Login Button -->
          <button type="submit" class="btn btn-primary w-100" id="loginBtn">
            Login
          </button>
        </form>

        <hr class="my-4">


        <div class="text-center mt-3">
          <p class="mb-2 small text-muted">Are you a parent/guardian?</p>
          <a href="parent-login.html" class="btn btn-outline-success btn-sm w-100">Parent Portal Login</a>
        </div>
      </div>
      <div class="card-footer bg-light text-center text-muted small">
        <p class="mb-0">Secure Healthcare System | 2024</p>
      </div>
    </div>
  </div>

  <script>
    // Determine API base URL based on environment
    const getApiBaseUrl = () => {
      const isDevelopment = ['localhost', '127.0.0.1', '[::1]'].includes(window.location.hostname);
      
      if (isDevelopment) {
        return 'http://localhost:5000/api';
      }
      
      // Production: use Render backend
      return 'https://child-immunization-api.onrender.com/api';
    };

    const API_BASE_URL = getApiBaseUrl();

    async function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value.trim();
      const errorAlert = document.getElementById('errorAlert');
      const loginBtn = document.getElementById('loginBtn');

      // Hide error alert and disable button to prevent double submit
      errorAlert.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';

      try {
        const response = await fetch(`${API_BASE_URL}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password })
        });

        const responseText = await response.text();
        let result;
        try {
          result = JSON.parse(responseText);
        } catch {
          result = { message: responseText || 'Login failed' };
        }

        if (!response.ok) {
          throw new Error(result.message || 'Login failed');
        }

        // Save token and user data
        localStorage.setItem('token', result.data.token);
        localStorage.setItem('user', JSON.stringify(result.data.user));

        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error('Login error:', error);
        errorAlert.textContent = error.message || 'Login failed. Please try again.';
        errorAlert.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    }
  </script>
</body>
</html>
