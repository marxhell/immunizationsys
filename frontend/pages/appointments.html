<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointments - Child Vaccination System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <button class="navbar-toggler-menu" onclick="toggleSidebar()" title="Toggle menu"></button>
      <a class="navbar-brand fw-bold" href="dashboard.html">Child Vaccination System</a>
      <div class="ms-auto d-flex align-items-center">
        <span class="text-light me-3 small" id="userDisplay"></span>
      </div>
    </div>
  </nav>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <!-- Popup Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <div class="brand-logo">CV</div>
        <h6>Child Vaccination</h6>
      </div>
      <button class="btn-close btn-close-white" onclick="closeSidebar()"></button>
    </div>
    <ul class="nav flex-column" id="sidebarMenu"></ul>
  </nav>

  <div class="container-fluid mt-3">
    <div class="row">
      <!-- Main Content (full width) -->
      <main class="col-12 p-4">
        <h2 class="mb-4">Appointments Management</h2>

        <!-- Toolbar -->
        <div class="row mb-4">
          <div class="col-md-8"></div>
          <div class="col-md-4 text-end">
            <div class="d-inline-block">
              <button class="btn btn-primary me-2" data-bs-toggle="modal" data-bs-target="#createAppointmentModal">Schedule Appointment</button>
              <button class="btn btn-outline-secondary" id="sendRemindersBtn" onclick="handleSendReminders()">Send Reminders</button>
            </div>
          </div>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-4" role="tablist">
          <li class="nav-item">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#todayTab">Today's Schedule</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#allTab">All Appointments</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#missedTab">Missed</button>
          </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content">
          <!-- Today's Schedule -->
          <div class="tab-pane fade show active" id="todayTab">
            <div class="card">
              <div class="card-header">
                <h5 class="mb-0">Today's Appointments</h5>
              </div>
              <div class="card-body">
                <div id="todayList"></div>
              </div>
            </div>
          </div>

          <!-- All Appointments -->
          <div class="tab-pane fade" id="allTab">
            <div class="card">
              <div class="card-header">
                <h5 class="mb-0">All Appointments</h5>
              </div>
              <div class="card-body">
                <div id="allList"></div>
              </div>
            </div>
          </div>

          <!-- Missed Appointments -->
          <div class="tab-pane fade" id="missedTab">
            <div class="card">
              <div class="card-header">
                <h5 class="mb-0">Missed Appointments</h5>
              </div>
              <div class="card-body">
                <div id="missedList"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Create Appointment Modal -->
  <div class="modal fade" id="createAppointmentModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Schedule Appointment</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="appointmentForm" onsubmit="handleCreateAppointment(event)">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Child *</label>
                <select class="form-select" id="appointmentChild" required>
                  <option value="">Select child...</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Vaccine *</label>
                <select class="form-select" id="appointmentVaccine" required>
                  <option value="">Select vaccine...</option>
                </select>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Appointment Date *</label>
                <input type="date" class="form-control" id="appointmentDate" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Appointment Time *</label>
                <input type="time" class="form-control" id="appointmentTime" required>
              </div>
            </div>
            <!-- remarks removed -->
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="handleCreateAppointment()">Schedule</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/dashboard.js"></script>
  <script src="../js/appointments.js"></script>
</body>
</html>
